name = "timely-tasker"
pages_build_output_dir = "build"

# Workers compatibility date for D1 and Pages Functions
compatibility_date = "2025-01-01"

# Note: build_image_version and [build] command are configured in the
# Cloudflare Pages dashboard — wrangler CLI rejects them for Pages projects.

[[d1_databases]]
binding = "DB"
database_name = "timely-tasker-prod"
database_id = "aa7d5c29-1614-4e2c-bfd5-d32730808cac"

[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "timely-tasker-dev"
database_id = "f6f204f2-aa00-4c10-a3ed-84cc98537a3d"
